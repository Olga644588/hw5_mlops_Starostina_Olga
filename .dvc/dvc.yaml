stages:
  preprocess:
    cmd: python src/data/preprocess.py
    deps:
      - data/raw/iris.csv
    outs:
      - data/processed/processed_data.pkl

  train:
    cmd: python src/models/train_model.py
    deps:
      - data/processed/processed_data.pkl
      - params.yaml
    outs:
      - models/model.pkl
    metrics:
      - metrics.json
    plots:
      - plots/roc.json

  evaluate:
    cmd: python src/models/evaluate_model.py
    deps:
      - models/model.pkl
      - data/processed/processed_data.pkl
    outs:
      - reports/metrics.txt
